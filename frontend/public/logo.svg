<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" role="img" aria-label="Mybridge.my">
  <title>Mybridge.my</title>
  <defs>
    <style>
      .mb-navy { fill: #1E2A78; }
      .mb-orange { fill: #F26522; }
      .mb-word { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; font-size: 88px; letter-spacing: -3px; }
      .mb-tld { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 800; font-size: 40px; letter-spacing: -1px; }
    </style>
  </defs>

  <!-- Bridge arch above the "i" of "bridge" -->
  <path d="M 268 38 Q 305 -2 342 38"
        fill="none"
        stroke="#1E2A78"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="6" y="100" class="mb-word">
    <tspan class="mb-navy">My</tspan><tspan class="mb-orange">bridge</tspan>
  </text>

  <!-- .my TLD -->
  <text x="430" y="100" class="mb-tld mb-orange">.my</text>
</svg>
